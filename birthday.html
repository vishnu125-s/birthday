<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            text-align: center;
            font-family: 'Poppins', sans-serif;
            color: white;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(270deg, #ff0000, #ff7300, #fffb00, #48ff00, #00f7ff, #2b65ff, #8000ff);
            background-size: 1400% 1400%;
            animation: bg 10s ease infinite;
        }

        @keyframes bg {
            0% {background-position:0% 50%;}
            50% {background-position:100% 50%;}
            100% {background-position:0% 50%;}
        }

        h1 { font-size: 55px; margin-top: 80px; }
        h2 { font-size: 40px; }

        p {
            font-size: 22px;
            width: 70%;
            margin: auto;
            line-height: 1.6;
        }

        .balloon {
            position: fixed;
            width: 100px;
            animation: float 5s infinite;
        }

        .left { left: 20px; top: 30%; }
        .right { right: 20px; top: 40%; }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
            100% { transform: translateY(0); }
        }

        .cap {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
        }

        .tamil {
            margin-top: 20px;
            font-size: 26px;
            color: yellow;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <img class="balloon left" src="https://cdn-icons-png.flaticon.com/512/3468/3468374.png">
    <img class="balloon right" src="https://cdn-icons-png.flaticon.com/512/3468/3468374.png">
    <img class="cap" src="https://cdn-icons-png.flaticon.com/512/3468/3468371.png">

    <h1>🎉 Happy Birthday 🎂</h1>
    <h2> Sweetha 💖</h2>

    <p>
        Wishing you a very Happy Birthday 🥳<br><br>
        May your day be filled with happiness 😊<br>
        and your year with success and joy ✨<br><br>
        Stay happy and keep smiling always 💫
    </p>

    <div class="tamil">
        இனிய பிறந்தநாள் வாழ்த்துக்கள் 🎂
    </div>

</body>
</html>
